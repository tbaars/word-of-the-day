      --muted: #5f6b7a;
      --blue: #2f5fda;
      --card: rgba(255, 255, 255, 0.82);
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:

        radial-gradient(circle at bottom right, rgba(169, 222, 249, 0.7), transparent 32%),
        linear-gradient(180deg, #eef6ff 0%, #f8fbff 48%, #fff8e7 100%);
      color: var(--ink);
      text-align: center;
      padding: 24px;
      box-sizing: border-box;
    }
    .card {
      width: min(760px, 100%);
      background: var(--card);
      padding: clamp(28px, 7vw, 56px);
      border-radius: 32px;
      box-shadow: 0 18px 44px rgba(47, 95, 218, 0.13);
      border: 1px solid rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(8px);
      box-sizing: border-box;
    }
    .eyebrow {
      display: inline-block;
      margin-bottom: 16px;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(47, 95, 218, 0.09);
      color: var(--blue);
      font-size: clamp(14px, 3vw, 18px);
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .date {
      font-size: clamp(18px, 4vw, 24px);
      margin-bottom: 18px;
      color: var(--muted);
      font-weight: 650;
    }
    .word {
      font-size: clamp(54px, 14vw, 124px);
      font-weight: 950;
      letter-spacing: -0.055em;
      line-height: 0.95;
      margin: 8px 0 24px;
      color: var(--blue);
      overflow-wrap: anywhere;
    }
    .definition {
      font-size: clamp(24px, 5.4vw, 42px);
      line-height: 1.22;
      font-weight: 700;
      color: #2b3440;
    }
    .sentence {
      margin: 30px auto 0;
      max-width: 620px;
      font-size: clamp(20px, 4.3vw, 31px);
      line-height: 1.32;
      color: #4b5563;
      font-style: italic;
    }
    .challenge {
      margin-top: 28px;
      font-size: clamp(17px, 3.8vw, 24px);
      color: #365314;
      background: rgba(190, 242, 100, 0.28);
      padding: 14px 18px;
      border-radius: 18px;
      font-weight: 750;

  </style>
