      border-radius: 999px;

    const startDate = new Date("2026-06-15T00:00:00");
    const today = new Date();
    const todayMidnight = new Date(today.getFullYear(), today.getMonth(), today.getDate());

    const maxDay = Math.min(
      words.length - 1,
      Math.max(0, Math.floor((todayMidnight - startDate) / (1000 * 60 * 60 * 24)))
    );

    let currentDay = maxDay;

    function getDateForDay(dayIndex) {
      const date = new Date(startDate);
      date.setDate(startDate.getDate() + dayIndex);
      return date;
    }

    function renderDay(dayIndex) {
      const entry = words[dayIndex];
      const displayDate = getDateForDay(dayIndex);

      document.getElementById("date").textContent =
        displayDate.toLocaleDateString(undefined, {
          weekday: "long",
          month: "long",
          day: "numeric"
        });

      document.getElementById("word").textContent = entry.word;
      document.getElementById("definition").textContent = entry.definition;
      document.getElementById("sentence").textContent = `“${entry.sentence}”`;

      if (dayIndex === maxDay) {
        document.getElementById("challenge").textContent = `Try using “${entry.word}” today.`;
      } else {
        document.getElementById("challenge").textContent = "Can you remember what this word means?";
      }

      document.getElementById("prev").disabled = dayIndex <= 0;
      document.getElementById("next").disabled = dayIndex >= maxDay;
    }

    document.getElementById("prev").addEventListener("click", () => {
      if (currentDay > 0) {
        currentDay--;
        renderDay(currentDay);
      }
    });

    document.getElementById("next").addEventListener("click", () => {
      if (currentDay < maxDay) {
        currentDay++;
        renderDay(currentDay);
      }
    });

    renderDay(currentDay);
